services:
  - type: web
    name: radhin-portfolio-backend
    runtime: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        value: https://portfoli-pi-eight.vercel.app
      - key: PORT
        value: "5000"
